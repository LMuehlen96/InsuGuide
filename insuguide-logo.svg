<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" role="img" aria-label="InsuGuide Logo">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- App-Icon -->
  <g transform="translate(10,10)">
    <rect width="100" height="100" rx="24" fill="url(#ig)"/>
    <path d="M50 20 C50 20 73 46 73 63 A23 23 0 1 1 27 63 C27 46 50 20 50 20 Z" fill="#ffffff"/>
    <path d="M40 63 l7 7 14 -15" fill="none" stroke="#1d4ed8" stroke-width="6"
